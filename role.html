<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Your Role — HIMS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <!-- ROLE SELECTION PAGE -->
  <div class="role-page">

    <div class="role-header">
      <h1>Welcome to HIMS</h1>
      <p>Please select your role to continue</p>
    </div>

    <div class="role-cards">

      <a href="admin.html" class="role-card">
        <div class="role-icon">🛡️</div>
        <h2>Admin</h2>
        <p>Manage users, records, billing, and system reports</p>
      </a>

      <a href="doctor.html" class="role-card">
        <div class="role-icon">🩺</div>
        <h2>Doctor</h2>
        <p>View patient records and manage appointments</p>
      </a>

      <a href="patient.html" class="role-card">
        <div class="role-icon">🧑</div>
        <h2>Patient</h2>
        <p>Check your appointments and billing details</p>
      </a>

    </div>

    <p class="role-back"><a href="index.html">← Back to Home</a></p>

  </div>

</body>
</html>
